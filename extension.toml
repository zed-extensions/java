id = "java"
name = "Java"
version = "6.8.24"
schema_version = 1
authors = [
    "Java Extension Contributors",
]
description = "Java support."
repository = "https://github.com/zed-extensions/java"

[grammars.java]
repository = "https://github.com/tree-sitter/tree-sitter-java"
commit = "94703d5a6bed02b98e438d7cad1136c01a60ba2c"

[grammars.properties]
repository = "https://github.com/tree-sitter-grammars/tree-sitter-properties"
commit = "579b62f5ad8d96c2bb331f07d1408c92767531d9"

[grammars.groovy]
repository = "https://github.com/murtaza64/tree-sitter-groovy"
commit = "deb0dcf8c4544f07564060f6e9b9f6e4b0bfc27d"

# Kotlin grammar for `*.gradle.kts` build scripts (the same grammar the Kotlin
# extension uses). Bundled so KTS highlighting works without that extension.
[grammars.kotlin]
repository = "https://github.com/fwcd/tree-sitter-kotlin"
commit = "4e909d6cc9ac96b4eaecb3fb538eaca48e9e9ee9"

[language_servers.jdtls]
name = "Eclipse JDT Language Server"
language = "Java"

[language_servers.gradle-language-server]
name = "Gradle Language Server"
languages = ["Gradle", "Gradle KTS"]

[debug_adapters.Java]

[[capabilities]]
kind = "process:exec"
command = "*"
args = ["-version"]
